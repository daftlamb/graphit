<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph It</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f2ee; font-family: 'Georgia', serif; overflow: hidden; }

#setup {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #f5f2ee; z-index: 200;
}
.setup-card {
  background: #fff; border: 1px solid rgba(0,0,0,0.08);
  border-radius: 20px; padding: 40px 44px; width: 420px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.07);
}
.setup-card h1 { font-size: 28px; font-weight: 400; letter-spacing: -0.5px; color: #1a1a1a; margin-bottom: 6px; }
.setup-card .sub { color: rgba(0,0,0,0.38); font-size: 13px; margin-bottom: 32px; font-family: sans-serif; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 11px; color: rgba(0,0,0,0.4); font-family: sans-serif; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.12);
  border-radius: 10px; font-size: 13px; font-family: monospace;
  background: #fafafa; color: #222; outline: none;
}
.field input:focus { border-color: rgba(0,0,0,0.3); background: #fff; }
.field .hint { font-size: 11px; color: rgba(0,0,0,0.3); margin-top: 5px; font-family: sans-serif; }
.btn-go {
  width: 100%; padding: 12px; background: #1a1a1a; color: #fff;
  border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
  font-family: sans-serif; letter-spacing: 0.3px; margin-top: 8px;
}
.btn-go:hover { background: #333; }
#setup-error { color: #c0392b; font-size: 12px; font-family: sans-serif; margin-top: 10px; display: none; }

#graph-wrap { position: fixed; inset: 0; display: none; }
svg { width: 100%; height: 100%; }

.node-label {
  font-family: sans-serif; font-size: 11px; fill: rgba(0,0,0,0.55);
  pointer-events: none; user-select: none;
}

#tooltip {
  position: fixed; background: #fff; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 12px; padding: 12px 16px; max-width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1); pointer-events: none;
  display: none; z-index: 100; font-family: sans-serif;
}
#tooltip .tt-title { font-size: 13px; color: #1a1a1a; font-weight: 600; margin-bottom: 4px; }
#tooltip .tt-type  { font-size: 11px; color: rgba(0,0,0,0.38); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
#tooltip .tt-tags  { display: flex; flex-wrap: wrap; gap: 4px; }
#tooltip .tt-tag   { background: #f0ede8; color: rgba(0,0,0,0.5); font-size: 10px; padding: 2px 8px; border-radius: 20px; }
#tooltip .tt-link  { font-size: 11px; color: #888; margin-top: 8px; cursor: pointer; text-decoration: underline; }

#topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  display: none; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.08); border-radius: 40px;
  padding: 8px 14px; z-index: 100;
}
#topbar h2 { font-size: 15px; font-weight: 400; color: #1a1a1a; letter-spacing: -0.3px; }
#topbar .sep { color: rgba(0,0,0,0.2); font-size: 12px; }
#node-count { font-size: 12px; color: rgba(0,0,0,0.38); font-family: sans-serif; }
.tb-btn {
  background: none; border: 1px solid rgba(0,0,0,0.12); color: rgba(0,0,0,0.5);
  padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 11px;
  font-family: sans-serif; transition: all 0.15s;
}
.tb-btn:hover { background: rgba(0,0,0,0.05); }
.tb-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

#loading {
  position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
  background: #f5f2ee; z-index: 150; flex-direction: column; gap: 16px;
}
#loading .ld-title { font-size: 18px; color: #1a1a1a; }
#loading .ld-sub { font-size: 13px; color: rgba(0,0,0,0.38); font-family: sans-serif; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <h1>Graph It</h1>
    <p class="sub">visualize your Notion as a knowledge graph</p>
    <div class="field">
      <label>Notion API Key</label>
      <input type="password" id="inp-key" placeholder="ntn_xxxxxxxxxxxx">
      <div class="hint">notion.so/my-integrations → copy Internal Integration Secret</div>
    </div>
    <div class="field">
      <label>Database ID <span style="opacity:0.5">(optional)</span></label>
      <input type="text" id="inp-db" placeholder="32-char ID from page URL">
      <div class="hint">leave blank to scan all accessible pages</div>
    </div>
    <button class="btn-go" id="btn-go">Build Graph →</button>
    <div id="setup-error"></div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div class="ld-title">Reading Notion…</div>
  <div class="ld-sub" id="ld-status">fetching pages</div>
</div>

<div id="graph-wrap">
  <svg id="svg"></svg>
</div>

<div id="topbar">
  <h2>Graph It</h2>
  <span class="sep">·</span>
  <span id="node-count">0 nodes</span>
  <span class="sep">·</span>
  <button class="tb-btn active" id="btn-force">force</button>
  <button class="tb-btn" id="btn-radial">radial</button>
  <button class="tb-btn" id="btn-timeline">timeline</button>
  <span class="sep">·</span>
  <button class="tb-btn" id="btn-reset-view">reset</button>
  <button class="tb-btn" id="btn-back">← back</button>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-type"  id="tt-type"></div>
  <div class="tt-tags"  id="tt-tags"></div>
  <div class="tt-link"  id="tt-link">open in Notion ↗</div>
</div>
<script>
const NOTION_PROXY = 'https://notionproxy.daftlamb.workers.dev/v1';
const NOTION_VERSION = '2022-06-28';

async function notionFetch(path, key, body=null) {
  const url = NOTION_PROXY + path;
  const opts = {
    method: body ? 'POST' : 'GET',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Notion-Version': NOTION_VERSION,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error('Notion API ' + r.status + ': ' + await r.text());
  return r.json();
}

function setStatus(s) { document.getElementById('ld-status').textContent = s; }

async function fetchDatabase(dbId, key) {
  const pages = []; let cursor;
  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await notionFetch('/databases/'+dbId+'/query', key, body);
    pages.push(...res.results);
    cursor = res.has_more ? res.next_cursor : undefined;
  } while (cursor);
  return pages;
}

async function fetchAllPages(key) {
  const pages = []; let cursor;
  do {
    const body = { page_size: 100, filter: { value: 'page', property: 'object' } };
    if (cursor) body.start_cursor = cursor;
    const res = await notionFetch('/search', key, body);
    pages.push(...res.results);
    cursor = res.has_more ? res.next_cursor : undefined;
  } while (cursor);
  return pages;
}

function getTitle(page) {
  if (!page.properties) return 'Untitled';
  for (const prop of Object.values(page.properties)) {
    if (prop.type === 'title' && prop.title && prop.title.length > 0)
      return prop.title.map(t => t.plain_text).join('');
  }
  return 'Untitled';
}

function getTags(page) {
  if (!page.properties) return [];
  const tags = [];
  for (const prop of Object.values(page.properties)) {
    if (prop.type === 'multi_select' && prop.multi_select)
      prop.multi_select.forEach(v => v && tags.push(v.name));
    else if (prop.type === 'select' && prop.select)
      tags.push(prop.select.name);
  }
  return tags;
}

function buildGraph(pages) {
  const nodes = [], links = [], tagMap = {};
  const idSet = new Set(pages.map(p => p.id));
  pages.forEach(page => {
    const title = getTitle(page);
    const tags  = getTags(page);
    const type  = page.parent?.type || 'page';
    const created = new Date(page.created_time).getTime();
    nodes.push({ id: page.id, title, tags, type, url: page.url, created });
    tags.forEach(t => { if (!tagMap[t]) tagMap[t]=[]; tagMap[t].push(page.id); });
    if (page.properties) {
      for (const prop of Object.values(page.properties)) {
        if (prop.type === 'relation' && prop.relation)
          prop.relation.forEach(rel => {
            if (idSet.has(rel.id)) links.push({ source: page.id, target: rel.id, type: 'relation' });
          });
      }
    }
  });
  Object.values(tagMap).forEach(ids => {
    if (ids.length < 2) return;
    for (let i=0;i<ids.length;i++) for (let j=i+1;j<ids.length;j++)
      links.push({ source: ids[i], target: ids[j], type: 'tag' });
  });
  return { nodes, links };
}

const TYPE_COLORS = { database_id:'#c8b8a2', page_id:'#a8c4b8', workspace:'#b8a8c4', default:'#c4b8a8' };
function nodeColor(d) { return TYPE_COLORS[d.type] || TYPE_COLORS.default; }
function nodeR(d) { return Math.max(10, Math.min(22, 8 + d.tags.length * 2.5)); }

// ── global graph state ────────────────────────────────────
let gData = null, gSvg = null, gG = null, gZoom = null;
let gNode = null, gLink = null, gSim = null;
let currentMode = 'force';

function showTooltip(e, d) {
  document.getElementById('tt-title').textContent = d.title;
  document.getElementById('tt-type').textContent  = d.type.replace('_id','');
  document.getElementById('tt-tags').innerHTML = d.tags.map(t=>`<span class="tt-tag">${t}</span>`).join('');
  document.getElementById('tt-link').onclick = () => window.open(d.url,'_blank');
  const tt = document.getElementById('tooltip');
  tt.style.display='block'; tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-10)+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

// ── mode: force ───────────────────────────────────────────
function applyForce() {
  if (gSim) gSim.stop();
  const W = window.innerWidth, H = window.innerHeight;
  const nodes = gData.nodes, links = gData.links;

  gSim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='tag'?90:60).strength(d=>d.type==='tag'?0.3:0.7))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(d=>nodeR(d)+4));

  gLink.transition().duration(600)
    .attr('stroke', d=>d.type==='relation'?'rgba(0,0,0,0.25)':'rgba(0,0,0,0.08)')
    .attr('stroke-width', d=>d.type==='relation'?1.5:0.8);

  gSim.on('tick', () => {
    gLink.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    gNode.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
  gSim.alpha(0.8).restart();
}

// ── mode: radial (cluster by tag) ────────────────────────
function applyRadial() {
  if (gSim) gSim.stop();
  const W = window.innerWidth, H = window.innerHeight;
  const cx = W/2, cy = H/2;
  const nodes = gData.nodes;

  // group by most common tag
  const tagCount = {};
  nodes.forEach(n => n.tags.forEach(t => { tagCount[t]=(tagCount[t]||0)+1; }));
  const topTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,12).map(e=>e[0]);
  const tagIndex = {};
  topTags.forEach((t,i) => tagIndex[t]=i);

  const R = Math.min(W,H)*0.38;
  const targets = nodes.map(n => {
    const tag = n.tags.find(t => tagIndex[t]!==undefined);
    if (tag !== undefined) {
      const idx = tagIndex[tag];
      const angle = (idx / topTags.length) * Math.PI * 2 - Math.PI/2;
      const r = R * (0.5 + Math.random()*0.5);
      return { x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r };
    }
    return { x: cx + (Math.random()-0.5)*80, y: cy + (Math.random()-0.5)*80 };
  });

  gSim = d3.forceSimulation(nodes)
    .force('x', d3.forceX((d,i)=>targets[i].x).strength(0.5))
    .force('y', d3.forceY((d,i)=>targets[i].y).strength(0.5))
    .force('collision', d3.forceCollide(d=>nodeR(d)+3))
    .force('charge', d3.forceManyBody().strength(-40));

  gLink.transition().duration(600).attr('stroke','rgba(0,0,0,0.06)').attr('stroke-width',0.6);

  gSim.on('tick', () => {
    gLink.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    gNode.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
  gSim.alpha(0.8).restart();
}

// ── mode: timeline ────────────────────────────────────────
function applyTimeline() {
  if (gSim) gSim.stop();
  const W = window.innerWidth, H = window.innerHeight;
  const nodes = gData.nodes;
  const pad = 80;

  const times = nodes.map(n=>n.created).filter(Boolean);
  const tMin = Math.min(...times), tMax = Math.max(...times);
  const xScale = d3.scaleLinear().domain([tMin,tMax]).range([pad, W-pad]);

  // group by type for y position
  const types = [...new Set(nodes.map(n=>n.type))];
  const yScale = d3.scaleOrdinal().domain(types).range(
    types.map((_,i) => pad + (i+1)*(H-pad*2)/(types.length+1))
  );

  const targets = nodes.map(n => ({
    x: n.created ? xScale(n.created) : W/2,
    y: yScale(n.type) + (Math.random()-0.5)*40
  }));

  gSim = d3.forceSimulation(nodes)
    .force('x', d3.forceX((d,i)=>targets[i].x).strength(0.8))
    .force('y', d3.forceY((d,i)=>targets[i].y).strength(0.8))
    .force('collision', d3.forceCollide(d=>nodeR(d)+3));

  gLink.transition().duration(600).attr('stroke','rgba(0,0,0,0.05)').attr('stroke-width',0.5);

  gSim.on('tick', () => {
    gLink.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    gNode.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
  gSim.alpha(0.8).restart();
}

// ── draw graph (init once) ────────────────────────────────
function drawGraph(data) {
  gData = data;
  const { nodes, links } = data;
  document.getElementById('node-count').textContent = nodes.length + ' nodes · ' + links.length + ' links';

  const svg = d3.select('#svg');
  svg.selectAll('*').remove();
  const W = window.innerWidth, H = window.innerHeight;

  gG = svg.append('g');
  gZoom = d3.zoom().scaleExtent([0.1,4]).on('zoom', e => gG.attr('transform', e.transform));
  svg.call(gZoom);
  gSvg = svg;

  gLink = gG.append('g').selectAll('line').data(links).join('line')
    .attr('stroke','rgba(0,0,0,0.1)').attr('stroke-width',0.8);

  gNode = gG.append('g').selectAll('g').data(nodes).join('g')
    .attr('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active&&gSim) gSim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active&&gSim) gSim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  gNode.append('circle')
    .attr('r', nodeR)
    .attr('fill', nodeColor)
    .attr('stroke','rgba(255,255,255,0.8)')
    .attr('stroke-width',1.5);

  gNode.append('text').attr('class','node-label')
    .attr('dy', d=>nodeR(d)+12).attr('text-anchor','middle')
    .text(d=>d.title.length>18?d.title.slice(0,16)+'…':d.title);

  gNode.on('mouseenter', showTooltip).on('mouseleave', hideTooltip);

  applyForce();
}

// ── mode switch ───────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  ['force','radial','timeline'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });
  if (mode==='force')    applyForce();
  else if (mode==='radial')   applyRadial();
  else if (mode==='timeline') applyTimeline();
}

// ── main flow ─────────────────────────────────────────────
document.getElementById('btn-go').addEventListener('click', async () => {
  const key  = document.getElementById('inp-key').value.trim();
  const dbId = document.getElementById('inp-db').value.trim().replace(/-/g,'');
  const errEl = document.getElementById('setup-error');
  errEl.style.display='none';
  if (!key) { errEl.textContent='Please enter your Notion API key'; errEl.style.display='block'; return; }

  document.getElementById('setup').style.display='none';
  document.getElementById('loading').style.display='flex';

  try {
    let pages;
    if (dbId) { setStatus('querying database…'); pages = await fetchDatabase(dbId, key); }
    else       { setStatus('searching all pages…'); pages = await fetchAllPages(key); }
    setStatus(`building graph from ${pages.length} pages…`);
    const data = buildGraph(pages);
    document.getElementById('loading').style.display='none';
    document.getElementById('graph-wrap').style.display='block';
    document.getElementById('topbar').style.display='flex';
    drawGraph(data);
  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('setup').style.display='flex';
    errEl.textContent=err.message; errEl.style.display='block';
  }
});

document.getElementById('btn-force').addEventListener('click',    ()=>setMode('force'));
document.getElementById('btn-radial').addEventListener('click',   ()=>setMode('radial'));
document.getElementById('btn-timeline').addEventListener('click', ()=>setMode('timeline'));
document.getElementById('btn-reset-view').addEventListener('click', ()=>gSvg.transition().duration(500).call(gZoom.transform, d3.zoomIdentity));
document.getElementById('btn-back').addEventListener('click', () => {
  if (gSim) gSim.stop();
  document.getElementById('graph-wrap').style.display='none';
  document.getElementById('topbar').style.display='none';
  document.getElementById('setup').style.display='flex';
});
</script>
</body>
</html>
